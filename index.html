<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AquaSmart — Pool Intelligence Dashboard</title>
    <script>
      try {
        // Test if localStorage is accessible
        window.localStorage.getItem('test');
      } catch (e) {
        // Prevent SecurityError in cross-origin iframes when libraries try to access storage
        const memoryStore = new Map();
        const mockStorage = {
          getItem: (key) => memoryStore.has(key) ? memoryStore.get(key) : null,
          setItem: (key, value) => memoryStore.set(key, String(value)),
          removeItem: (key) => memoryStore.delete(key),
          clear: () => memoryStore.clear(),
          key: (index) => Array.from(memoryStore.keys())[index] || null,
          get length() { return memoryStore.size; }
        };
        Object.defineProperty(window, 'sessionStorage', {
          get: function() { return mockStorage; },
          configurable: true
        });
        Object.defineProperty(window, 'localStorage', {
          get: function() { return mockStorage; },
          configurable: true
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
